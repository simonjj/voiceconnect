image: node:14.16.0

setup: &setup
  step:
    name: Npm install
    caches:
      - node
    script:
      - yarn

test: &test
  step:
    name: Test
    caches:
      - node
    script:
      - yarn test

pipelines:
  pull-requests:
    '**':
      - <<: *setup
      - <<: *test
  branches:
    develop:
      - <<: *setup
      - <<: *test
