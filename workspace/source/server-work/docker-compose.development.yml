version: '3.8'
services:
  proxy:
    environment:
      - CERT_PATHS=/etc/letsencrypt/live
  app-server:
    image: node:lts-alpine
    volumes:
      - ./:/app
    working_dir: /app
    depends_on:
      - mongo
      - kafka
    tty: true
    stdin_open: true
    environment:
      NODE_ENV: ${NODE_ENV}
      DEBUG: ${DEBUG}
    expose:
      - 7000
      - 9229
    ports:
      - 7000:7000
      - 9229:9229
    links:
      - kafka
      - zookeeper
      - mongo
    command: ['npm', 'run', 'server:dev']
  kafka:
    links:
      - zookeeper
    volumes:
      - ./scripts/kafka.sh:/docker-entrypoint-initdb.d/kafka.sh:ro
  zookeeper:
  mongo:
