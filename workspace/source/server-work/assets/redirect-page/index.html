<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
        />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <link rel="stylesheet" href="/assets/redirect-page/style.css" />
        <link
            rel="shortcut icon"
            href="/assets/redirect-page/icons/favicon.ico"
            type="image/x-icon"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Raleway:wght@500&display=swap"
            rel="stylesheet"
        />
        <script src="https://use.fontawesome.com/9164c4328e.js"></script>
        <title>Connect</title>
    </head>
    <body>
        <div class="container">
            <div class="logo">
                <img src="/assets/redirect-page/icons/icon.png" alt="logo" />
                <span>Connect</span>
            </div>
            <div class="description">
                <h1>Launching Connect App</h1>
            </div>
            <div class="download">
                <h2>Don't have app?</h2>
                <div class="builds">
                    <div class="builds-card">
                        <a
                            class="icon-link"
                            href="https://s3.amazonaws.com/connect-downloads/connect-app-windows-latest.zip"
                        >
                            <i class="fa fa-windows"></i>
                        </a>
                        <a
                            class="button-link"
                            href="https://s3.amazonaws.com/connect-downloads/connect-app-windows-latest.zip"
                        >
                            Download
                        </a>
                        <h3>WINDOWS 10 (64-BIT)</h3>
                    </div>
                    <div class="builds-card">
                        <a
                            class="icon-link"
                            href="https://s3.amazonaws.com/connect-downloads/connect-app-macos-latest.zip"
                        >
                            <i class="fa fa-apple"></i>
                        </a>
                        <a
                            class="button-link"
                            href="https://s3.amazonaws.com/connect-downloads/connect-app-macos-latest.zip"
                        >
                            Download
                        </a>
                        <h3>MACOS (10.12 - 10.14)</h3>
                    </div>
                    <div class="builds-card">
                        <a
                            class="icon-link"
                            href="https://s3.amazonaws.com/connect-downloads/connect-app-linux-latest-appimage.zip"
                        >
                            <i class="fa fa-linux"></i>
                        </a>
                        <a
                            class="button-link"
                            href="https://s3.amazonaws.com/connect-downloads/connect-app-linux-latest-appimage.zip"
                        >
                            Download
                        </a>
                        <h3>LINUX (64-BIT APPIMAGE)</h3>
                        <p>
                            <a
                                href="//s3.amazonaws.com/connect-downloads/connect-app-linux-latest.deb"
                                >Debian package</a
                            >
                        </p>
                        <p>
                            <a
                                href="//s3.amazonaws.com/connect-downloads/connect-app-linux-latest.tar.gz"
                                >Tar.gz package</a
                            >
                        </p>
                    </div>
                </div>
            </div>
        </div>
        <script src="/assets/redirect-page/index.js"></script>
    </body>
</html>
