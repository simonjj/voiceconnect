<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0078D4"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <symbol id="azure" viewBox="0 0 32 32">
      <path d="M14.5 4 L4 28 L11 28 L18.5 9 Z" fill="#0078D4"/>
      <path d="M18 12 L13 22 L20 22 L17 26 L28 26 L20.5 8 Z" fill="#50E6FF"/>
    </symbol>
    <symbol id="react" viewBox="-25 -22 50 44">
      <circle r="3" fill="#61DAFB"/>
      <g fill="none" stroke="#61DAFB" stroke-width="1.6">
        <ellipse rx="22" ry="8"/>
        <ellipse rx="22" ry="8" transform="rotate(60)"/>
        <ellipse rx="22" ry="8" transform="rotate(120)"/>
      </g>
    </symbol>
    <symbol id="node" viewBox="0 0 32 32">
      <path d="M16 2 L29 9 L29 23 L16 30 L3 23 L3 9 Z" fill="#3C873A"/>
      <text x="16" y="21" font-size="11" font-weight="700" fill="#fff" text-anchor="middle" font-family="Segoe UI">N</text>
    </symbol>
    <symbol id="python" viewBox="0 0 32 32">
      <path d="M16 3c-5 0-5 2-5 2v3h5v1H6s-3 0-3 6 3 6 3 6h3v-3c0-3 3-3 3-3h8s3 0 3-3V5s0-2-5-2H16Zm-3 2a1.2 1.2 0 1 1 0 2.4A1.2 1.2 0 0 1 13 5Z" fill="#3776AB"/>
      <path d="M16 29c5 0 5-2 5-2v-3h-5v-1h10s3 0 3-6-3-6-3-6h-3v3c0 3-3 3-3 3h-8s-3 0-3 3v5s0 2 5 2h2Zm3-2a1.2 1.2 0 1 1 0-2.4A1.2 1.2 0 0 1 19 27Z" fill="#FFD43B"/>
    </symbol>
    <symbol id="copilot" viewBox="0 0 32 32">
      <circle cx="16" cy="16" r="13" fill="#0f172a"/>
      <circle cx="11" cy="15" r="2.6" fill="#fff"/>
      <circle cx="21" cy="15" r="2.6" fill="#fff"/>
      <rect x="9" y="20" width="14" height="2" rx="1" fill="#fff"/>
    </symbol>
    <symbol id="gpu" viewBox="0 0 32 32">
      <rect x="5" y="5" width="22" height="22" rx="3" fill="#76B900"/>
      <rect x="9" y="9" width="14" height="14" rx="1.5" fill="#1a1a1a"/>
      <text x="16" y="20" font-size="7" font-weight="700" fill="#76B900" text-anchor="middle" font-family="Segoe UI">GPU</text>
      <g fill="#76B900">
        <rect x="3" y="9" width="2" height="2"/><rect x="3" y="14" width="2" height="2"/><rect x="3" y="19" width="2" height="2"/>
        <rect x="27" y="9" width="2" height="2"/><rect x="27" y="14" width="2" height="2"/><rect x="27" y="19" width="2" height="2"/>
        <rect x="9" y="3" width="2" height="2"/><rect x="14" y="3" width="2" height="2"/><rect x="19" y="3" width="2" height="2"/>
        <rect x="9" y="27" width="2" height="2"/><rect x="14" y="27" width="2" height="2"/><rect x="19" y="27" width="2" height="2"/>
      </g>
    </symbol>
    <symbol id="browser" viewBox="0 0 32 32">
      <rect x="2" y="4" width="28" height="24" rx="2" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
      <rect x="2" y="4" width="28" height="6" rx="2" fill="#e2e8f0"/>
      <circle cx="6" cy="7" r="1.1" fill="#ef4444"/><circle cx="9" cy="7" r="1.1" fill="#f59e0b"/><circle cx="12" cy="7" r="1.1" fill="#10b981"/>
    </symbol>
    <symbol id="mic" viewBox="0 0 24 24">
      <rect x="9" y="3" width="6" height="12" rx="3" fill="#475569"/>
      <path d="M6 11a6 6 0 0 0 12 0" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="12" y1="17" x2="12" y2="21" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
    <symbol id="speaker" viewBox="0 0 24 24">
      <path d="M3 9v6h4l5 4V5L7 9H3z" fill="#475569"/>
      <path d="M15 8a5 5 0 0 1 0 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M18 5a9 9 0 0 1 0 14" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect width="1280" height="880" fill="#f8fafc"/>
  <text x="40" y="46" font-size="24" font-weight="700" fill="#0f172a">VoiceConnect — runtime architecture</text>
  <text x="40" y="68" font-size="13" fill="#64748b">Real-time multi-agent voice assistant on Azure Container Apps + ACA Sandboxes</text>

  <!-- BROWSER -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="320" height="170" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <use href="#browser" x="56" y="116" width="36" height="36"/>
    <text x="100" y="132" font-size="15" font-weight="700" fill="#0f172a">Browser</text>
    <text x="100" y="150" font-size="11" fill="#64748b">User on Chrome / Edge</text>
    <use href="#react" x="80" y="200" width="44" height="44"/>
    <text x="150" y="195" font-size="13" font-weight="600" fill="#0f172a">React + Vite client</text>
    <text x="150" y="212" font-size="11" fill="#475569">• AudioWorklet mic capture</text>
    <text x="150" y="227" font-size="11" fill="#475569">• Scheduled-clock PCM playback</text>
    <text x="150" y="242" font-size="11" fill="#475569">• WebSocket /ws (PCM up · audio + JSON down)</text>
    <use href="#mic" x="296" y="116" width="22" height="22"/>
    <use href="#speaker" x="324" y="116" width="22" height="22"/>
  </g>

  <!-- AZURE ENVELOPE -->
  <g>
    <rect x="40" y="310" width="1200" height="500" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-dasharray="4 4"/>
    <use href="#azure" x="56" y="322" width="22" height="22"/>
    <text x="86" y="340" font-size="14" font-weight="700" fill="#0078D4">Azure subscription · voiceconnect-N (swedencentral) + voiceconnect-express (westcentralus)</text>
  </g>

  <!-- Container Apps Environment (standard, swedencentral) -->
  <g>
    <rect x="80" y="360" width="900" height="280" rx="12" fill="#ffffff" stroke="#93c5fd"/>
    <use href="#azure" x="96" y="372" width="20" height="20"/>
    <text x="122" y="388" font-size="13" font-weight="700" fill="#0078D4">Azure Container Apps · managed environment (swedencentral)</text>
    <text x="122" y="404" font-size="11" fill="#64748b">workload profiles: Consumption · Consumption-GPU-NC8as-T4</text>
  </g>

  <!-- Container Apps Environment (Express, westcentralus) -->
  <g>
    <rect x="80" y="655" width="900" height="145" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="0"/>
    <use href="#azure" x="96" y="667" width="20" height="20"/>
    <text x="122" y="683" font-size="13" font-weight="700" fill="#b45309">Azure Container Apps · Express environment (westcentralus)</text>
    <text x="122" y="699" font-size="11" fill="#92400e">scale-to-zero · no workload profiles · cross-region call to sandbox group</text>
  </g>

  <!-- connect-server (public) -->
  <g filter="url(#shadow)">
    <rect x="100" y="430" width="280" height="180" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="100" y="430" width="280" height="28" rx="10" fill="#0078D4"/>
    <rect x="100" y="448" width="280" height="10" fill="#0078D4"/>
    <text x="114" y="449" font-size="12" font-weight="700" fill="#ffffff">Container App · public ingress</text>
    <use href="#node" x="114" y="472" width="32" height="32"/>
    <text x="156" y="486" font-size="14" font-weight="700" fill="#0f172a">connect-server</text>
    <text x="156" y="502" font-size="11" fill="#64748b">Node + WebSocket hub</text>
    <text x="114" y="528" font-size="11" fill="#475569">• multi-agent-session.ts</text>
    <text x="114" y="544" font-size="11" fill="#475569">• addressing.ts (hey Aria · team · fallback)</text>
    <text x="114" y="560" font-size="11" fill="#475569">• tts-queue.ts (sequential playback)</text>
    <text x="114" y="586" font-size="11" font-style="italic" fill="#64748b">voiceconnect-server.&lt;env&gt;.azurecontainerapps.io</text>
  </g>

  <!-- STT -->
  <g filter="url(#shadow)">
    <rect x="410" y="430" width="270" height="180" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="410" y="430" width="270" height="28" rx="10" fill="#76B900"/>
    <rect x="410" y="448" width="270" height="10" fill="#76B900"/>
    <text x="424" y="449" font-size="12" font-weight="700" fill="#ffffff">Container App · GPU · internal</text>
    <use href="#gpu" x="424" y="472" width="32" height="32"/>
    <use href="#python" x="458" y="472" width="28" height="28"/>
    <text x="498" y="486" font-size="14" font-weight="700" fill="#0f172a">connect-stt</text>
    <text x="498" y="502" font-size="11" fill="#64748b">Whisper (FastAPI)</text>
    <text x="424" y="530" font-size="11" fill="#475569">• WS /stream · float32 PCM in</text>
    <text x="424" y="546" font-size="11" fill="#475569">• partial + final transcripts</text>
    <text x="424" y="562" font-size="11" fill="#475569">• NC8as-T4 · 8 CPU · 56 GiB</text>
  </g>

  <!-- TTS -->
  <g filter="url(#shadow)">
    <rect x="710" y="430" width="260" height="180" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="710" y="430" width="260" height="28" rx="10" fill="#76B900"/>
    <rect x="710" y="448" width="260" height="10" fill="#76B900"/>
    <text x="724" y="449" font-size="12" font-weight="700" fill="#ffffff">Container App · GPU · internal</text>
    <use href="#gpu" x="724" y="472" width="32" height="32"/>
    <use href="#python" x="758" y="472" width="28" height="28"/>
    <text x="798" y="486" font-size="14" font-weight="700" fill="#0f172a">connect-tts</text>
    <text x="798" y="502" font-size="11" fill="#64748b">Kokoro (FastAPI)</text>
    <text x="724" y="530" font-size="11" fill="#475569">• POST /tts → float32 PCM</text>
    <text x="724" y="546" font-size="11" fill="#475569">• 24 kHz · per-agent voice id</text>
    <text x="724" y="562" font-size="11" fill="#475569">• NC8as-T4 · 8 CPU · 56 GiB</text>
  </g>

  <!-- Agent Express App · Aria -->
  <g filter="url(#shadow)">
    <rect x="100" y="715" width="420" height="78" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="100" y="715" width="420" height="22" rx="10" fill="#3b82f6"/>
    <rect x="100" y="729" width="420" height="8" fill="#3b82f6"/>
    <text x="114" y="731" font-size="11" font-weight="700" fill="#ffffff">Express App · public ingress + token</text>
    <use href="#python" x="114" y="746" width="22" height="22"/>
    <circle cx="148" cy="757" r="8" fill="#3b82f6"/>
    <text x="164" y="761" font-size="13" font-weight="700" fill="#0f172a">connect-sandbox-agent · Aria</text>
    <text x="114" y="781" font-size="10" fill="#475569">FastAPI /chat → NDJSON · execs `copilot -p` via aca CLI</text>
  </g>

  <!-- Agent Express App · Nova -->
  <g filter="url(#shadow)">
    <rect x="550" y="715" width="420" height="78" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="550" y="715" width="420" height="22" rx="10" fill="#ec4899"/>
    <rect x="550" y="729" width="420" height="8" fill="#ec4899"/>
    <text x="564" y="731" font-size="11" font-weight="700" fill="#ffffff">Express App · public ingress + token</text>
    <use href="#python" x="564" y="746" width="22" height="22"/>
    <circle cx="598" cy="757" r="8" fill="#ec4899"/>
    <text x="614" y="761" font-size="13" font-weight="700" fill="#0f172a">connect-sandbox-agent · Nova</text>
    <text x="564" y="781" font-size="10" fill="#475569">FastAPI /chat → NDJSON · execs `copilot -p` via aca CLI</text>
  </g>

  <!-- Sandbox Group (right column) -->
  <g>
    <rect x="1000" y="360" width="240" height="430" rx="12" fill="#ffffff" stroke="#93c5fd"/>
    <use href="#azure" x="1016" y="372" width="20" height="20"/>
    <text x="1042" y="388" font-size="13" font-weight="700" fill="#0078D4">ACA Sandbox group</text>
    <text x="1016" y="404" font-size="11" fill="#64748b">voiceconnect-sb (data plane)</text>

    <g filter="url(#shadow)">
      <rect x="1016" y="430" width="208" height="160" rx="10" fill="#f8fafc" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="1032" cy="450" r="8" fill="#3b82f6"/>
      <text x="1048" y="454" font-size="13" font-weight="700" fill="#0f172a">Sandbox · Aria</text>
      <use href="#copilot" x="1024" y="470" width="28" height="28"/>
      <text x="1060" y="486" font-size="11" font-weight="600" fill="#0f172a">Copilot CLI</text>
      <text x="1060" y="500" font-size="10" fill="#64748b">disk: copilot</text>
      <text x="1024" y="528" font-size="10" fill="#475569">• isolated FS + tools</text>
      <text x="1024" y="544" font-size="10" fill="#475569">• GH_TOKEN injected</text>
      <text x="1024" y="560" font-size="10" fill="#475569">• ephemeral per turn</text>
      <text x="1024" y="580" font-size="9" font-family="Consolas, monospace" fill="#94a3b8">72d637b9-…</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="1016" y="610" width="208" height="160" rx="10" fill="#f8fafc" stroke="#ec4899" stroke-width="1.5"/>
      <circle cx="1032" cy="630" r="8" fill="#ec4899"/>
      <text x="1048" y="634" font-size="13" font-weight="700" fill="#0f172a">Sandbox · Nova</text>
      <use href="#copilot" x="1024" y="650" width="28" height="28"/>
      <text x="1060" y="666" font-size="11" font-weight="600" fill="#0f172a">Copilot CLI</text>
      <text x="1060" y="680" font-size="10" fill="#64748b">disk: copilot</text>
      <text x="1024" y="708" font-size="10" fill="#475569">• isolated FS + tools</text>
      <text x="1024" y="724" font-size="10" fill="#475569">• GH_TOKEN injected</text>
      <text x="1024" y="740" font-size="10" fill="#475569">• ephemeral per turn</text>
      <text x="1024" y="760" font-size="9" font-family="Consolas, monospace" fill="#94a3b8">8c6af0cc-…</text>
    </g>
  </g>

  <!-- EDGES -->
  <g stroke="#0078D4" stroke-width="2" fill="none">
    <path d="M200 270 V 430" marker-end="url(#arrow-blue)"/>
    <path d="M240 430 V 270" marker-end="url(#arrow-blue)"/>
  </g>
  <rect x="208" y="338" width="74" height="22" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="245" y="353" font-size="11" font-weight="600" fill="#0078D4" text-anchor="middle">WSS · /ws</text>
  <text x="245" y="372" font-size="9" fill="#64748b" text-anchor="middle">PCM up · audio + JSON down</text>

  <line x1="380" y1="510" x2="410" y2="510" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="395" y="502" font-size="9" fill="#475569" text-anchor="middle">WS</text>

  <path d="M380 540 Q 540 620 710 540" stroke="#475569" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <text x="540" y="608" font-size="9" fill="#475569" text-anchor="middle">HTTP · /tts</text>

  <path d="M240 610 L 240 715" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M320 610 L 700 715" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <text x="252" y="678" font-size="10" font-weight="600" fill="#10b981">POST /chat (cross-region)</text>
  <text x="500" y="676" font-size="10" font-weight="600" fill="#10b981">POST /chat · NDJSON (cross-region)</text>

  <path d="M520 754 L 1016 510" stroke="#3b82f6" stroke-width="1.8" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow-blue)"/>
  <path d="M970 754 L 1016 690" stroke="#ec4899" stroke-width="1.8" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow-blue)"/>
  <text x="780" y="630" font-size="10" font-weight="600" fill="#3b82f6">aca sandbox exec (cross-region)</text>



  <!-- legend -->
  <g transform="translate(40, 826)">
    <rect width="1200" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <g font-size="11" fill="#475569">
      <circle cx="20" cy="20" r="6" fill="#0078D4"/><text x="34" y="24">Azure platform &amp; data plane</text>
      <circle cx="220" cy="20" r="6" fill="#76B900"/><text x="234" y="24">GPU workload (NC8as-T4)</text>
      <circle cx="410" cy="20" r="6" fill="#10b981"/><text x="424" y="24">agent /chat (NDJSON)</text>
      <circle cx="590" cy="20" r="6" fill="#3b82f6"/><text x="604" y="24">Aria persona</text>
      <circle cx="720" cy="20" r="6" fill="#ec4899"/><text x="734" y="24">Nova persona</text>
      <rect x="844" y="14" width="14" height="12" rx="2" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="864" y="24">Express environment</text>
      <line x1="1010" y1="20" x2="1040" y2="20" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="6 4"/>
      <text x="1048" y="24">control-plane call (aca CLI)</text>
    </g>
  </g>
</svg>
